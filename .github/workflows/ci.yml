# ============================================
# GitHub Actions CI/CD Pipeline
# ============================================
name: ElectricAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data
        run: python -m data_pipeline.synthetic_data

      - name: Run data pipeline tests
        run: pytest tests/test_data_pipeline.py -v --tb=short

      - name: Run model tests
        run: pytest tests/test_models.py -v --tb=short

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t electric-ai:latest .

      - name: Run container smoke test
        run: |
          docker run -d --name electric-test -p 8000:8000 electric-ai:latest
          sleep 30
          curl -f http://localhost:8000/health || exit 1
          docker stop electric-test
